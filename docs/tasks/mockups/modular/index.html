<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lingourmet Modular UI Viewer</title>
    <link rel="stylesheet" href="style.css?v=20260407-2">
    <style>
        #debugOverlay {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: #0f0; 
            font-family: monospace; font-size: 10px; z-index: 9999; max-height: 100px; overflow-y: auto;
            padding: 4px; pointer-events: none; display: none;
        }
    </style>
</head>
<body>
    <div id="debugOverlay"></div>

    <nav class="global-nav">
        <div class="nav-left">
            <div class="nav-tabs" id="mainNavTabs">
                <button class="nav-tab active" data-target="courseMapView">學習地圖</button>
                <button class="nav-tab" data-target="libraryView">知識文庫</button>
            </div>
        </div>
        <div class="nav-right">
            <button class="btn" id="darkModeToggle" style="padding: 8px 12px; border-radius: 10px;">🌓 深色模式</button>
            <div id="unitIndicator" class="tiny-text muted" style="font-weight:700; display:none;"></div>
        </div>
    </nav>

    <!-- View: Course Map (Grid of Chapters) -->
    <div id="courseMapView" class="view-container active">
        <div class="course-map-grid" id="courseMapGrid">
            <div class="empty-state">準備中...</div>
        </div>
    </div>

    <div id="libraryView" class="view-container">
        <div class="lib-layout">
            <!-- Sidebar: Table of Contents -->
            <aside class="lib-sidebar" id="libSidebar">
                <div class="lib-sidebar-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h2>知識目錄</h2>
                        <p class="tiny-text muted">主題式文法與句型</p>
                    </div>
                    <button class="btn-close-sidebar" onclick="APP.toggleLibSidebar(false)">✕</button>
                </div>
                <div class="search-box-wrap" style="padding:0 16px 16px;">
                    <input type="text" class="search-input" placeholder="搜尋語法、句型..." id="libSearch">
                </div>
                <div class="lib-toc" id="libToc">
                    <!-- Categories and items will be injected here -->
                    <div class="empty-state tiny-text">正在讀取目錄...</div>
                </div>
            </aside>

            <!-- Main: Content Reader -->
            <main class="lib-main">
                <!-- Mobile Navigation Bar (Shown on small screens) -->
                <div class="lib-mobile-nav" id="libMobileNav">
                    <button class="btn tiny-text" onclick="APP.toggleLibSidebar(true)">☰ 目錄</button>
                    <div id="libCurrentTitle" class="tiny-text" style="font-weight:700;">請選擇主題</div>
                </div>

                <div class="lib-reader" id="libReader">
                    <div class="empty-state" style="margin-top:100px;">
                        <div class="icon" style="font-size:48px;">📖</div>
                        <h3>歡迎來到 Lingourmet 韓語知識文庫</h3>
                        <p class="muted-text">請從左側目錄選擇一個主題開始學習。</p>
                        <div class="featured-list" id="libFeaturedList" style="margin-top:32px;"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- View: Lesson Detail (The original 3-pane view) -->
    <div class="page" id="lessonView">
        <!-- Sidebar: Unit Overview -->
        <aside class="panel sidebar">
            <div class="panel-content">
                <button class="btn tiny-text" style="margin-bottom:16px; width:100%;" id="backToMapBtn">← 返回地圖</button>
                <h1 id="unitTitle">Unit Title</h1>
                <div class="muted-text tiny-text" id="unitSub">LEVEL · TL · LOCALE</div>

                <div class="meta-grid" id="unitMetaGrid"></div>

                <h2>學習目標 (Can-do)</h2>
                <ul class="can-do" id="canDoList"></ul>

                <div class="pills" id="rolePills"></div>

                <div class="unit-progress">
                    <div class="progress-header">
                        <span>單元進度</span>
                        <span id="progressText">0/0</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="btn-group" style="margin-top: 12px; width: 100%; flex-direction: column; gap: 6px;">
                        <div style="display:flex; gap:6px;">
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpNextIncompleteBtn">下一個</button>
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpNextReviewBtn">待回看</button>
                        </div>
                    </div>
                </div>

                <div id="roleSummaryBox" style="margin-top:20px;"></div>

                <div class="toggle-row">
                    <label for="bilingualToggle"><strong>韓中對照 (Bilingual)</strong></label>
                    <input id="bilingualToggle" type="checkbox" checked />
                </div>
                <div id="followupsBox"></div>
            </div>
        </aside>

        <!-- List Pane: Sequence -->
        <section class="panel list-pane">
            <div class="panel-header">
                <h2 style="margin:0; font-size: 16px;">學習節點</h2>
            </div>
            <div class="node-list" id="nodeList"></div>
        </section>

        <!-- Detail Pane: Content Viewer -->
        <section class="panel detail-pane">
            <div class="panel-content" id="detailContent">
                <div id="detailHeader"></div>
                <div id="detailSummary"></div>
                <div id="detailBody"></div>
            </div>

            <div class="footer-bar">
                <div class="btn-group">
                    <button class="btn" id="prevBtn">上一節</button>
                    <button class="btn" id="nextBtn">下一節</button>
                </div>
                <div class="btn-group">
                    <button class="btn" id="markReviewBtn">待回看</button>
                    <button class="btn success" id="markDoneBtn">完成</button>
                </div>
            </div>
        </section>
    </div>
    <div id="libSidebarOverlay" class="sidebar-overlay" onclick="APP.toggleLibSidebar(false)"></div>
    <div id="toastContainer"></div>

    <!-- Dependencies -->
    <script src="js/utils.js?v=20260408"></script>
    <script src="js/adapter.js?v=20260408"></script>
    <script src="js/state.js?v=20260408"></script>
    <script src="js/tts.js?v=20260408"></script>
    <script src="js/renderers/core.js?v=20260408"></script>
    <script src="js/renderers/dialogue.js?v=20260408"></script>
    <script src="js/renderers/grammar.js?v=20260408"></script>
    <script src="js/renderers/pattern.js?v=20260408"></script>
    <script src="js/renderers/practice.js?v=20260408"></script>
    <script src="js/renderers/vocab.js?v=20260408"></script>
    <script src="js/renderers/usage.js?v=20260408"></script>
    <script src="js/app_v2.js?v=20260408"></script>
</body>
</html>
