<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lingourmet Modular UI Viewer</title>
    <link rel="stylesheet" href="style.css?v=20260303-1">
</head>

<body>
    <div class="page" id="mainPage">
        <!-- Sidebar: Unit Overview -->
        <aside class="panel sidebar">
            <div class="panel-content">
                <div class="selector-box" style="margin-bottom: 16px;">
                    <label for="unitSelect" class="tiny-text muted" style="display:block; margin-bottom:4px;">切換單元
                        (Active Unit)</label>
                    <select id="unitSelect"
                        style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--line); background:var(--bg); font-weight:600;"></select>
                </div>
                <h1 id="unitTitle">Unit Title</h1>
                <div class="muted-text tiny-text" id="unitSub">LEVEL · TL · LOCALE</div>

                <div class="meta-grid" id="unitMetaGrid"></div>

                <h2>學習目標 (Can-do)</h2>
                <ul class="can-do" id="canDoList"></ul>

                <div class="pills" id="rolePills"></div>

                <div class="unit-progress">
                    <div class="progress-header">
                        <span>單元進度</span>
                        <span id="progressText">0/0</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="btn-group" style="margin-top: 12px; width: 100%; flex-direction: column; gap: 6px;">
                        <div style="display:flex; gap:6px;">
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpNextIncompleteBtn"
                                title="跳到下一個未完成節點">下一個未完成</button>
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpNextReviewBtn"
                                title="跳到下一個標記待回看節點">下一個待回看</button>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpFirstOutputBtn"
                                title="跳到第一個練習/輸出節點">第一個練習</button>
                            <button class="btn tiny-text" style="flex:1; padding: 6px;" id="jumpReviewSummaryBtn"
                                title="跳到單元總結複習">單元總結</button>
                        </div>
                    </div>
                </div>

                <div id="roleSummaryBox" style="margin-top:20px;"></div>

                <div class="toggle-row">
                    <label for="bilingualToggle"><strong>韓中對照 (Bilingual)</strong></label>
                    <input id="bilingualToggle" type="checkbox" checked />
                </div>
                <div style="margin-top:10px;">
                    <label for="teachingLocaleSelect" class="tiny-text muted"
                        style="display:block; margin-bottom:4px;"><strong>教學語言 (Teaching Locale)</strong></label>
                    <select id="teachingLocaleSelect"
                        style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--line); background:var(--bg); font-weight:600;">
                        <option value="zh_tw">zh_tw</option>
                        <option value="en">en</option>
                    </select>
                </div>
                <div style="margin-top:10px;">
                    <div class="toggle-row">
                        <label for="ttsVoiceSelect"><strong>韓文語音 (TTS)</strong></label>
                        <button class="btn tiny-text" style="padding:4px 8px;" id="ttsTestBtn">測試</button>
                    </div>
                    <select id="ttsVoiceSelect"
                        style="width:100%; margin-top:6px; border:1px solid var(--line); border-radius:8px; padding:6px 8px; background:#fff;">
                        <option value="">系統預設韓文語音</option>
                    </select>
                    <div class="tiny-text muted" id="ttsVoiceHint" style="margin-top:4px;">使用瀏覽器/系統韓文語音（ko-KR）。</div>
                </div>
                <div id="followupsBox"></div>
            </div>
        </aside>

        <!-- List Pane: Sequence -->
        <section class="panel list-pane">
            <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size: 16px;">學習節點清單</h2>
                <button class="btn tiny-text" style="padding: 4px 10px;" id="resetProgressBtn">重置</button>
            </div>
            <div class="node-list" id="nodeList"></div>
        </section>

        <!-- Detail Pane: Content Viewer -->
        <section class="panel detail-pane">
            <div class="panel-content" id="detailContent">
                <div id="detailHeader"></div>
                <div id="detailSummary"></div>
                <div id="detailBody"></div>
            </div>

            <div class="footer-bar">
                <div class="btn-group">
                    <button class="btn" id="prevBtn">上一節</button>
                    <button class="btn" id="nextBtn">下一節</button>
                </div>
                <div class="btn-group">
                    <button class="btn" id="markReviewBtn">待回看</button>
                    <button class="btn success" id="markDoneBtn">標記完成</button>
                </div>
            </div>
        </section>
    </div>
    <div id="toastContainer"></div>

    <!-- Dependencies -->
    <script src="js/utils.js?v=20260227-1"></script>
    <script src="js/adapter.js?v=20260308-1"></script>
    <script src="js/state.js?v=20260227-1"></script>
    <script src="js/tts.js?v=20260227-1"></script>
    <script src="js/renderers/core.js?v=20260308-1"></script>
    <script src="js/renderers/dialogue.js?v=20260308-1"></script>
    <script src="js/renderers/pattern.js?v=20260308-1"></script>
    <script src="js/renderers/grammar.js?v=20260308-1"></script>
    <script src="js/renderers/practice.js?v=20260308-1"></script>
    <script src="js/app.js?v=20260227-1"></script>
</body>

</html>
