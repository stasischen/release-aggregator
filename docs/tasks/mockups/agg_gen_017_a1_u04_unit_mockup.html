<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A1-U04 Survival Unit Playable Mockup (HTML v1)</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --card: #fffdf8;
        --ink: #1f1d19;
        --muted: #696257;
        --line: #dbd0be;
        --accent: #be4c2e;
        --accent2: #2f7f77;
        --accent3: #7b5cf5;
        --ok: #1f6a39;
        --warn: #b26a00;
        --shadow: 0 8px 24px rgba(20, 18, 14, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        color: var(--ink);
        font-family: "Iowan Old Style", "Noto Serif TC", serif;
        background:
          radial-gradient(circle at 10% 0%, #fff8ed 0, transparent 35%),
          radial-gradient(circle at 85% 2%, #ffe7d8 0, transparent 30%),
          var(--bg);
      }
      button,
      input,
      textarea {
        font: inherit;
      }
      .page {
        max-width: 1320px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: 300px 360px 1fr;
        gap: 14px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        min-width: 0;
      }
      .sidebar,
      .list-pane,
      .detail-pane {
        padding: 14px;
      }
      .sidebar {
        position: sticky;
        top: 10px;
        align-self: start;
      }
      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.2;
      }
      h1 {
        font-size: 24px;
      }
      h2 {
        font-size: 17px;
      }
      h3 {
        font-size: 14px;
      }
      .muted {
        color: var(--muted);
      }
      .tiny {
        font-size: 12px;
      }
      .meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }
      .meta-box {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: #fff;
      }
      .meta-box .k {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 2px;
      }
      .can-do {
        margin: 10px 0 0;
        padding-left: 18px;
        font-size: 13px;
        line-height: 1.45;
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .pill {
        border: 1px solid var(--line);
        background: #f2ebde;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        white-space: nowrap;
      }
      .progress {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 8px;
      }
      .progress-actions {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .progress-summary {
        margin-top: 8px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: #fcfaf5;
        padding: 8px;
        display: grid;
        gap: 4px;
        font-size: 12px;
      }
      .toggle-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: #fcfaf5;
        padding: 8px;
        font-size: 12px;
      }
      .progress-track {
        height: 8px;
        border-radius: 999px;
        background: #eee4d6;
        overflow: hidden;
        margin-top: 6px;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        width: 0%;
        transition: width 0.2s ease;
      }
      .list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 10px;
      }
      .node-list {
        display: grid;
        gap: 8px;
        max-height: calc(100vh - 140px);
        overflow: auto;
        padding-right: 2px;
      }
      .node-item {
        border: 1px solid var(--line);
        border-left: 5px solid #b7b0a5;
        border-radius: 12px;
        background: #fff;
        padding: 10px;
        cursor: pointer;
        display: grid;
        gap: 5px;
      }
      .node-item.active {
        border-color: #c7a48f;
        box-shadow: 0 0 0 2px rgba(190, 76, 46, 0.08);
        background: #fffaf4;
      }
      .node-item.done {
        background: #fbfff8;
      }
      .node-item .top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: start;
      }
      .node-item .title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }
      .node-item .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        font-size: 10px;
      }
      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 6px;
        background: #fbf6ed;
      }
      .badge {
        font-size: 10px;
        border-radius: 999px;
        padding: 2px 6px;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge.done {
        color: var(--ok);
        border-color: #bfddc7;
        background: #eff9f1;
      }
      .badge.todo {
        color: var(--muted);
        border-color: var(--line);
        background: #f8f4ec;
      }
      .lane-immersion_input {
        border-left-color: var(--accent2);
      }
      .lane-structure_pattern,
      .lane-structure_grammar {
        border-left-color: var(--accent3);
      }
      .lane-controlled_output {
        border-left-color: var(--accent);
      }
      .lane-immersion_output {
        border-left-color: #d98d10;
      }
      .lane-review_retrieval {
        border-left-color: var(--ok);
      }

      .detail-pane {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
        min-height: 78vh;
      }
      .detail-head {
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
      }
      .detail-head .title {
        font-size: 20px;
        font-weight: 700;
        margin-top: 4px;
      }
      .detail-head .sub {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .detail-summary {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .summary-box {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 8px;
        font-size: 12px;
        background: #fcfaf5;
      }
      .detail-body {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px;
        overflow: auto;
        display: grid;
        gap: 10px;
        align-content: start;
      }
      .block {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: #fefcf7;
      }
      .block h4 {
        margin: 0 0 6px;
        font-size: 13px;
      }
      .line-list {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
        line-height: 1.45;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .btn:hover {
        background: #fcf8ef;
      }
      .btn.primary {
        background: #f8e1d9;
        border-color: #e0b3a6;
        color: #7b2f1d;
      }
      .btn.ghost {
        background: transparent;
      }
      .btn.success {
        background: #eaf6ed;
        border-color: #bdd8c3;
        color: var(--ok);
      }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }
      textarea,
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 8px;
        color: var(--ink);
      }
      textarea {
        min-height: 90px;
        resize: vertical;
      }
      .chunk-bank {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chunk {
        border: 1px solid #d8c9b5;
        background: #fff;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .chunk.used {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .answer-strip {
        border: 1px dashed var(--line);
        border-radius: 10px;
        min-height: 42px;
        padding: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        background: #fcfaf5;
      }
      .answer-chip {
        border: 1px solid #cdbca7;
        background: #fff;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .choice-list {
        display: grid;
        gap: 6px;
      }
      .choice {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 8px;
        cursor: pointer;
        font-size: 13px;
        text-align: left;
      }
      .choice.selected {
        border-color: #c49d8d;
        background: #fff8f2;
      }
      details {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 6px 8px;
        background: #fcfbf8;
      }
      summary {
        cursor: pointer;
      }
      .footer-nav {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .footer-left,
      .footer-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .followups {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }
      .followup {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f7fbf7;
        padding: 8px;
        font-size: 12px;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 1100px) {
        .page {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: static;
        }
        .node-list {
          max-height: none;
        }
        .detail-pane {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <aside class="panel sidebar">
        <h1 id="unitTitle">Loading...</h1>
        <div class="muted tiny" id="unitSub"></div>
        <div class="meta-grid" id="metaGrid"></div>
        <h2 style="margin-top: 12px">Can-do</h2>
        <ul class="can-do" id="canDo"></ul>
        <div class="pills" id="rolePills"></div>
        <div class="toggle-row">
          <label for="bilingualToggle"><strong>韓中對照</strong></label>
          <input id="bilingualToggle" type="checkbox" checked />
        </div>
        <div class="progress">
          <div class="row" style="justify-content: space-between">
            <strong>單元進度</strong>
            <span class="tiny" id="progressText">0/0</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-actions">
            <button class="btn ghost tiny" id="jumpNextIncompleteBtn">
              跳到下一個未完成
            </button>
            <button class="btn ghost tiny" id="jumpNextReviewBtn">
              跳到下一個待回看
            </button>
          </div>
          <div class="progress-summary" id="progressSummary"></div>
          <div class="tiny muted" style="margin-top: 6px">
            v1 不自動評分，只記錄完成與輸入內容，方便回看。
          </div>
        </div>
        <div class="followups" id="followupsBox"></div>
      </aside>

      <section class="panel list-pane">
        <div class="list-header">
          <div>
            <h2>節點清單</h2>
            <div class="tiny muted">可點選跳轉、回看、重做</div>
          </div>
          <button class="btn ghost tiny" id="resetProgressBtn">重置記錄</button>
        </div>
        <div class="node-list" id="nodeList"></div>
      </section>

      <section class="panel detail-pane">
        <div class="detail-head" id="detailHead"></div>
        <div class="detail-summary" id="detailSummary"></div>
        <div class="detail-body" id="detailBody"></div>
        <div class="footer-nav">
          <div class="footer-left">
            <button class="btn" id="prevBtn">上一節</button>
            <button class="btn" id="nextBtn">下一節</button>
          </div>
          <div class="footer-right">
            <button class="btn" id="markReviewBtn">標記為待回看</button>
            <button class="btn success" id="markDoneBtn">標記完成</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const BLUEPRINT_PATH = "./a1_u04_unit_blueprint_v0.json";
      const STORAGE_PREFIX = "agg_gen_mockup_unit_v1:";

      const state = {
        data: null,
        currentIndex: 0,
        progress: {
          completedNodeIds: [],
          reviewNodeIds: [],
          notesByNodeId: {},
          interactionStateByNodeId: {},
        },
      };

      const el = {
        unitTitle: document.getElementById("unitTitle"),
        unitSub: document.getElementById("unitSub"),
        metaGrid: document.getElementById("metaGrid"),
        canDo: document.getElementById("canDo"),
        rolePills: document.getElementById("rolePills"),
        progressText: document.getElementById("progressText"),
        progressFill: document.getElementById("progressFill"),
        progressSummary: document.getElementById("progressSummary"),
        followupsBox: document.getElementById("followupsBox"),
        nodeList: document.getElementById("nodeList"),
        detailHead: document.getElementById("detailHead"),
        detailSummary: document.getElementById("detailSummary"),
        detailBody: document.getElementById("detailBody"),
        prevBtn: document.getElementById("prevBtn"),
        nextBtn: document.getElementById("nextBtn"),
        markDoneBtn: document.getElementById("markDoneBtn"),
        markReviewBtn: document.getElementById("markReviewBtn"),
        resetProgressBtn: document.getElementById("resetProgressBtn"),
        jumpNextIncompleteBtn: document.getElementById("jumpNextIncompleteBtn"),
        jumpNextReviewBtn: document.getElementById("jumpNextReviewBtn"),
        bilingualToggle: document.getElementById("bilingualToggle"),
      };

      function storageKey() {
        const unitId = state.data?.unit?.unit_id || "unknown";
        return STORAGE_PREFIX + unitId;
      }

      function loadProgress() {
        try {
          const raw = localStorage.getItem(storageKey());
          if (!raw) return;
          const parsed = JSON.parse(raw);
          state.progress = {
            completedNodeIds: Array.isArray(parsed.completedNodeIds)
              ? parsed.completedNodeIds
              : [],
            reviewNodeIds: Array.isArray(parsed.reviewNodeIds)
              ? parsed.reviewNodeIds
              : [],
            notesByNodeId:
              parsed.notesByNodeId && typeof parsed.notesByNodeId === "object"
                ? parsed.notesByNodeId
                : {},
            interactionStateByNodeId:
              parsed.interactionStateByNodeId &&
              typeof parsed.interactionStateByNodeId === "object"
                ? parsed.interactionStateByNodeId
                : {},
            prefs:
              parsed.prefs && typeof parsed.prefs === "object"
                ? parsed.prefs
                : { showBilingual: true },
          };
        } catch (e) {
          console.warn("progress parse failed", e);
        }
        if (!state.progress.prefs)
          state.progress.prefs = { showBilingual: true };
      }

      function saveProgress() {
        if (!state.progress.prefs)
          state.progress.prefs = { showBilingual: true };
        localStorage.setItem(storageKey(), JSON.stringify(state.progress));
        renderProgress();
        renderNodeList();
      }

      function nodeById(nodeId) {
        return state.data.sequence.find((n) => n.id === nodeId);
      }

      function showBilingual() {
        return state.progress?.prefs?.showBilingual !== false;
      }

      function setShowBilingual(next) {
        if (!state.progress.prefs) state.progress.prefs = {};
        state.progress.prefs.showBilingual = !!next;
        saveProgress();
        renderCurrentNode();
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function formatKoWithZh(koText, zhText) {
        if (koText == null) return "";
        if (showBilingual() && zhText) return `${koText}（${zhText}）`;
        return String(koText);
      }

      function isDone(nodeId) {
        return state.progress.completedNodeIds.includes(nodeId);
      }

      function isReview(nodeId) {
        return state.progress.reviewNodeIds.includes(nodeId);
      }

      function toggleDone(nodeId, force) {
        const set = new Set(state.progress.completedNodeIds);
        const next = force === undefined ? !set.has(nodeId) : !!force;
        if (next) set.add(nodeId);
        else set.delete(nodeId);
        state.progress.completedNodeIds = Array.from(set);
        saveProgress();
        renderDetailFooterButtons();
      }

      function toggleReview(nodeId, force) {
        const set = new Set(state.progress.reviewNodeIds);
        const next = force === undefined ? !set.has(nodeId) : !!force;
        if (next) set.add(nodeId);
        else set.delete(nodeId);
        state.progress.reviewNodeIds = Array.from(set);
        saveProgress();
        renderDetailFooterButtons();
      }

      function getNodeInteractionState(nodeId) {
        if (!state.progress.interactionStateByNodeId[nodeId]) {
          state.progress.interactionStateByNodeId[nodeId] = {};
        }
        return state.progress.interactionStateByNodeId[nodeId];
      }

      function setNodeInteractionState(nodeId, patch) {
        const current = getNodeInteractionState(nodeId);
        state.progress.interactionStateByNodeId[nodeId] = {
          ...current,
          ...patch,
        };
        saveProgress();
      }

      function laneClass(role) {
        return "lane-" + role;
      }

      function makeTag(text) {
        const t = document.createElement("span");
        t.className = "tag";
        t.textContent = text;
        return t;
      }

      function renderSidebar() {
        const unit = state.data.unit;
        el.unitTitle.textContent = `${unit.unit_id} ${unit.title_zh_tw}`;
        el.unitSub.textContent = `${unit.target_language.toUpperCase()} · ${unit.learner_locale_source} · ${unit.level}`;

        el.metaGrid.innerHTML = "";
        [
          ["Theme", unit.theme_zh_tw],
          ["Output", `${Math.round(unit.output_ratio_target * 100)}%`],
          ["Nodes", String(state.data.sequence.length)],
          ["Platform", "HTML mock v1"],
        ].forEach(([k, v]) => {
          const box = document.createElement("div");
          box.className = "meta-box";
          box.innerHTML = `<span class="k">${k}</span>${v}`;
          el.metaGrid.appendChild(box);
        });

        el.canDo.innerHTML = "";
        unit.can_do_zh_tw.forEach((x) => {
          const li = document.createElement("li");
          li.textContent = x;
          el.canDo.appendChild(li);
        });

        const counts = {};
        state.data.sequence.forEach((n) => {
          counts[n.learning_role] = (counts[n.learning_role] || 0) + 1;
        });
        el.rolePills.innerHTML = "";
        Object.entries(counts).forEach(([k, v]) => {
          const p = document.createElement("span");
          p.className = "pill";
          p.textContent = `${k}: ${v}`;
          el.rolePills.appendChild(p);
        });

        el.followupsBox.innerHTML = "";
        el.bilingualToggle.checked = showBilingual();
        if ((state.data.scheduled_followups || []).length) {
          const title = document.createElement("h2");
          title.style.fontSize = "16px";
          title.style.marginTop = "8px";
          title.textContent = "跨單元複習排程";
          el.followupsBox.appendChild(title);
        }
        (state.data.scheduled_followups || []).forEach((f) => {
          const div = document.createElement("div");
          div.className = "followup";
          div.innerHTML = `<strong>${f.id}</strong> <span class="muted">${f.timing}</span> → <strong>${f.transfer_to}</strong><br>${f.goal_zh_tw}`;
          el.followupsBox.appendChild(div);
        });
      }

      function renderProgress() {
        const total = state.data.sequence.length;
        const done = state.progress.completedNodeIds.filter((id) =>
          nodeById(id),
        ).length;
        const review = state.progress.reviewNodeIds.filter((id) =>
          nodeById(id),
        ).length;
        const outputLikeRoles = new Set([
          "controlled_output",
          "immersion_output",
          "review_retrieval",
        ]);
        const outputLikeIds = state.data.sequence
          .filter((n) => outputLikeRoles.has(n.learning_role))
          .map((n) => n.id);
        const outputDone = outputLikeIds.filter((id) => isDone(id)).length;
        el.progressText.textContent = `${done}/${total}`;
        el.progressFill.style.width = total ? `${(done / total) * 100}%` : "0%";
        el.progressSummary.innerHTML = `
        <div>已完成：<strong>${done}</strong> / ${total}</div>
        <div>待回看：<strong>${review}</strong></div>
        <div>輸出/複習節點完成：<strong>${outputDone}</strong> / ${outputLikeIds.length}</div>
      `;
      }

      function jumpToNextByPredicate(predicate) {
        const total = state.data.sequence.length;
        if (!total) return false;
        for (let step = 1; step <= total; step += 1) {
          const idx = (state.currentIndex + step) % total;
          if (predicate(state.data.sequence[idx])) {
            state.currentIndex = idx;
            renderCurrentNode();
            return true;
          }
        }
        return false;
      }

      function renderNodeList() {
        el.nodeList.innerHTML = "";
        state.data.sequence.forEach((node, idx) => {
          const div = document.createElement("div");
          div.className = `node-item ${laneClass(node.learning_role)} ${idx === state.currentIndex ? "active" : ""} ${isDone(node.id) ? "done" : ""}`;
          div.onclick = () => {
            state.currentIndex = idx;
            renderCurrentNode();
          };

          const top = document.createElement("div");
          top.className = "top";
          const title = document.createElement("div");
          title.className = "title";
          title.textContent = `${idx + 1}. ${node.title_zh_tw}`;
          top.appendChild(title);

          const badge = document.createElement("span");
          badge.className = `badge ${isDone(node.id) ? "done" : "todo"}`;

      function renderChunkAssembly(node) {
        const nodeState = getNodeInteractionState(node.id);
        const tasks = node.payload?.tasks || [];
        const activeTaskIndex = Math.min(
          nodeState.activeTaskIndex || 0,
          Math.max(0, tasks.length - 1),
        );
        const task = tasks[activeTaskIndex];
        if (!task) {
          appendJsonPreview(
            "Missing chunk_assembly payload",
            node.payload || {},
          );
          return;
        }
        const answers = Array.isArray(nodeState.answers)
          ? nodeState.answers.slice()
          : [];
        const chunkGloss = task.chunk_gloss_by_ko || {};

        const header = document.createElement("div");
        header.className = "block";
        header.innerHTML = `<h4>Chunk Assembly</h4><div class="tiny muted">任務 ${activeTaskIndex + 1}/${tasks.length} · 不自動評分，可自行比對示例並標記完成</div><div style="margin-top:6px">${task.prompt_zh_tw}</div>`;
        el.detailBody.appendChild(header);

        const answerBlock = document.createElement("div");
        answerBlock.className = "block";
        answerBlock.innerHTML =
          "<h4>你的句子（點擊詞塊加入；點擊答案可移除）</h4>";
        const answerStrip = document.createElement("div");
        answerStrip.className = "answer-strip";
        answerBlock.appendChild(answerStrip);
        el.detailBody.appendChild(answerBlock);

        const bankBlock = document.createElement("div");
        bankBlock.className = "block";
        bankBlock.innerHTML = "<h4>詞塊庫</h4>";
        const bank = document.createElement("div");
        bank.className = "chunk-bank";
        bankBlock.appendChild(bank);
        el.detailBody.appendChild(bankBlock);

        function commitAnswers(nextAnswers) {
          setNodeInteractionState(node.id, {
            activeTaskIndex,
            answers: nextAnswers,
          });
        }

        function rerenderAnswers() {
          answerStrip.innerHTML = "";
          if (!answers.length) {
            const p = document.createElement("div");
            p.className = "tiny muted";
            p.textContent = "尚未組句";
            answerStrip.appendChild(p);
          }
          answers.forEach((a, idx) => {
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "answer-chip";
            chip.textContent = formatKoWithZh(a, chunkGloss[a]);
            chip.onclick = () => {
              answers.splice(idx, 1);
              commitAnswers(answers);
              rerenderAnswers();
              rerenderBank();
            };
            answerStrip.appendChild(chip);
          });
        }

        function rerenderBank() {
          bank.innerHTML = "";
          (task.chunks || []).forEach((chunkText) => {
            const usedCountInTask = answers.filter(
              (x) => x === chunkText,
            ).length;
            const totalCountInTask = (task.chunks || []).filter(
              (x) => x === chunkText,
            ).length;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className =
              "chunk" + (usedCountInTask >= totalCountInTask ? " used" : "");
            btn.textContent = formatKoWithZh(chunkText, chunkGloss[chunkText]);
            btn.disabled = usedCountInTask >= totalCountInTask;
            btn.onclick = () => {
              answers.push(chunkText);
              commitAnswers(answers);
              rerenderAnswers();
              rerenderBank();
            };
            bank.appendChild(btn);
          });
        }

        rerenderAnswers();
        rerenderBank();

        const controls = document.createElement("div");
        controls.className = "row";
        const resetBtn = document.createElement("button");
        resetBtn.className = "btn";
        resetBtn.textContent = "清空目前答案";
        resetBtn.onclick = () => {
          answers.length = 0;
          commitAnswers([]);
          rerenderAnswers();
          rerenderBank();
        };
        controls.appendChild(resetBtn);

        const exampleBtn = document.createElement("button");
        exampleBtn.className = "btn";
        exampleBtn.textContent = "查看示例";
        const exampleBox = document.createElement("div");
        exampleBox.className = "tiny muted";
        exampleBox.style.display = "none";
        exampleBox.textContent = `示例：${(task.target_examples || []).join(" / ")}${showBilingual() && (task.target_examples_zh_tw || []).length ? ` ｜ 中譯：${task.target_examples_zh_tw.join(" / ")}` : ""}`;
        exampleBtn.onclick = () => {
          exampleBox.style.display =
            exampleBox.style.display === "none" ? "block" : "none";
        };
        controls.appendChild(exampleBtn);

        const nextTaskBtn = document.createElement("button");
        nextTaskBtn.className = "btn primary";
        nextTaskBtn.textContent =
          activeTaskIndex < tasks.length - 1 ? "下一個拼句題" : "這是最後一題";
        nextTaskBtn.disabled = activeTaskIndex >= tasks.length - 1;
        nextTaskBtn.onclick = () => {
          setNodeInteractionState(node.id, {
            activeTaskIndex: activeTaskIndex + 1,
            answers: [],
          });
          renderCurrentNode();
        };
        controls.appendChild(nextTaskBtn);

        const block = document.createElement("div");
        block.className = "block";
        block.innerHTML = "<h4>操作</h4>";
        block.appendChild(controls);
        block.appendChild(exampleBox);
        el.detailBody.appendChild(block);
      }

      function renderByType(node) {
        if (node.content_form === "dialogue") renderDialogue(node);
        else if (node.content_form === "notice") renderNotice(node);
        else if (node.content_form === "message_thread")
          renderMessageThread(node);
        else if (node.content_form === "comparison_card")
          renderComparison(node);
        else if (node.content_form === "pattern_card") renderPatternCard(node);
        else if (node.content_form === "grammar_note")
          renderGrammarSections(node);
        else if (node.content_form === "functional_phrase_pack")
          renderDictionaryPack(node);
        else {
          appendJsonPreview("Renderer fallback (payload)", node.payload || {});
        }

        if (node.output_mode === "chunk_assembly") renderChunkAssembly(node);
        if (node.output_mode === "response_builder")
          renderResponseBuilder(node);
        if (
          node.output_mode === "guided" &&
          node.skill_focus.includes("writing")
        )
          renderGuidedWriting(node);
        if (
          node.output_mode === "guided" &&
          node.skill_focus.includes("speaking")
        )
          renderGuidedSpeaking(node);
        if (node.output_mode === "review_retrieval")
          renderReviewRetrieval(node);

        renderGenericNotes(node);
      }

      function renderDetailFooterButtons() {
        const node = state.data.sequence[state.currentIndex];
        el.prevBtn.disabled = state.currentIndex <= 0;
        el.nextBtn.disabled =
          state.currentIndex >= state.data.sequence.length - 1;
        el.markDoneBtn.textContent = isDone(node.id) ? "取消完成" : "標記完成";
        el.markReviewBtn.textContent = isReview(node.id)
          ? "取消待回看"
          : "標記為待回看";
      }

      function renderCurrentNode() {
        const node = state.data.sequence[state.currentIndex];
        renderNodeList();
        renderProgress();
        renderDetailHeader(node, state.currentIndex);
        renderDetailSummary(node);
        el.detailBody.innerHTML = "";
        appendSampleLines(node);
        renderByType(node);
        renderDetailFooterButtons();
      }

      function wireEvents() {
        el.prevBtn.onclick = () => {
          if (state.currentIndex > 0) {
            state.currentIndex -= 1;
            renderCurrentNode();
          }
        };
        el.nextBtn.onclick = () => {
          if (state.currentIndex < state.data.sequence.length - 1) {
            state.currentIndex += 1;
            renderCurrentNode();
          }
        };
        el.markDoneBtn.onclick = () => {
          const node = state.data.sequence[state.currentIndex];
          toggleDone(node.id);
        };
        el.markReviewBtn.onclick = () => {
          const node = state.data.sequence[state.currentIndex];
          toggleReview(node.id);
        };
        el.resetProgressBtn.onclick = () => {
          if (!confirm("確定要清除這個單元的完成記錄與互動輸入？")) return;
          state.progress = {
            completedNodeIds: [],
            reviewNodeIds: [],
            notesByNodeId: {},
            interactionStateByNodeId: {},
            prefs: { showBilingual: showBilingual() },
          };
          saveProgress();
          renderCurrentNode();
        };
        el.bilingualToggle.onchange = () =>
          setShowBilingual(el.bilingualToggle.checked);
        el.jumpNextIncompleteBtn.onclick = () => {
          const ok = jumpToNextByPredicate((node) => !isDone(node.id));
          if (!ok) alert("沒有未完成節點了。");
        };
        el.jumpNextReviewBtn.onclick = () => {
          const ok = jumpToNextByPredicate((node) => isReview(node.id));
          if (!ok) alert("目前沒有待回看節點。");
        };
      }

      function migrateOldMockupDataIfNeeded(raw) {
        // Accept the previous mockup JSON shape for backwards compatibility.
        if (raw.version === "unit_blueprint_v0") return raw;
        if (!raw.unit_id || !Array.isArray(raw.sequence)) return raw;
        return {
          version: "unit_blueprint_v0",
          unit: {
            unit_id: raw.unit_id,
            title_zh_tw: raw.title_zh_tw || raw.unit_theme || raw.unit_id,
            target_language: raw.target_language || "ko",
            learner_locale_source: raw.learner_locale_source || "zh-TW",
            level: raw.level || raw.level_band || "A1",
            theme_zh_tw: raw.theme || raw.unit_theme || "",
            output_ratio_target: raw.output_ratio_target || 0.5,
            can_do_zh_tw: raw.can_do_zh_tw || [],
          },
          sequence: raw.sequence.map((item) => ({
            id: item.id,
            candidate_type: item.candidate_type,
            content_form: item.content_form || "unknown",
            learning_role: item.learning_role,
            skill_focus: Array.isArray(item.skill_focus)
              ? item.skill_focus
              : [item.skill_focus || "integrated"],
            output_mode: item.output_mode || "none",
            duration_min: item.duration_min || 3,
            title_zh_tw: item.title || item.title_zh_tw || item.id,
            summary_zh_tw: item.summary_zh_tw || "",
            sample_lines: item.sample_lines || [],
            expected_output_zh_tw:
              item.expected_output || item.expected_output_zh_tw || "",
            payload: item.payload || {},
          })),
          scheduled_followups: raw.scheduled_followups || [],
        };
      }

      async function bootstrap() {
        wireEvents();
        try {
          const resp = await fetch(BLUEPRINT_PATH);
          const raw = await resp.json();
          state.data = migrateOldMockupDataIfNeeded(raw);
        } catch (e) {
          el.detailHead.innerHTML = '<div class="title">載入失敗</div>';
          el.detailSummary.innerHTML = `<div class="empty">${String(e)}<br>請用 static server 開啟（例如 python3 -m http.server）</div>`;
          return;
        }
        renderSidebar();
        loadProgress();
        renderCurrentNode();
      }

      bootstrap();
    </script>
  </body>
</html>
